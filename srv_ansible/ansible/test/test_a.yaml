---
- name: Compliance Remediation (ИБН 2.2.3–2.2.6)
  hosts: users
  become: true
  gather_facts: false

  vars:
    ldap_admin_group: "SG-ADM-T1-SRV-LINUX-ADMINS"
    ldap_users_group: "SG-PC-USERS"

  tasks:

  #####################################################################
  # 2.2.3 PASSWORD POLICY
  #####################################################################

    - name: Ensure pwquality parameters
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        unsafe_writes: true
      loop:
        - { regexp: '^\s*minlen\s*=', line: 'minlen = 8' }
        - { regexp: '^\s*minclass\s*=', line: 'minclass = 3' }
        - { regexp: '^\s*maxrepeat\s*=', line: 'maxrepeat = 3' }
        - { regexp: '^\s*usercheck\s*=', line: 'usercheck = 1' }
        - { regexp: '^\s*reject_username\s*=', line: 'reject_username = 1' }
        - { regexp: '^\s*enforce_for_root\s*$', line: 'enforce_for_root' }

    - name: Ensure pwhistory parameters
      ansible.builtin.lineinfile:
        path: /etc/security/pwhistory.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        unsafe_writes: true
      loop:
        - { regexp: '^\s*remember\s*=', line: 'remember = 3' }
        - { regexp: '^\s*enforce_for_root\s*$', line: 'enforce_for_root' }

    - name: Ensure login.defs parameters
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        unsafe_writes: true
      loop:
        - { regexp: '^\s*PASS_MAX_DAYS\s+', line: 'PASS_MAX_DAYS   180' }
        - { regexp: '^\s*PASS_MIN_DAYS\s+', line: 'PASS_MIN_DAYS   0' }
        - { regexp: '^\s*PASS_WARN_AGE\s+', line: 'PASS_WARN_AGE   7' }
        - { regexp: '^\s*ENCRYPT_METHOD\s+', line: 'ENCRYPT_METHOD  SHA512' }

    - name: Remove old pwquality/pwhistory from PAM
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-password
        regexp: 'pam_(pwquality|pwhistory)\.so'
        state: absent
        unsafe_writes: true

    - name: Ensure pam_pwquality
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-password
        insertafter: '^password'
        line: 'password requisite pam_pwquality.so retry=3'
        unsafe_writes: true

    - name: Ensure pam_pwhistory right after pwquality
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-password
        insertafter: 'pam_pwquality\.so'
        line: 'password required pam_pwhistory.so'
        unsafe_writes: true

  #####################################################################
  # 2.2.4 SUDO & SU RESTRICTIONS
  #####################################################################

    - name: Configure sudoers ldap-sudo
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ldap-sudo
        owner: root
        group: root
        mode: "0440"
        content: |
          %{{ ldap_admin_group }} ALL=(ALL:ALL) ALL
          localadmin ALL=(ALL:ALL) ALL
        validate: "/usr/sbin/visudo -cf %s"

    - name: Remove old pam_wheel
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        regexp: 'pam_wheel\.so'
        state: absent
        unsafe_writes: true

    - name: Ensure pam_wheel after pam_rootok
      ansible.builtin.lineinfile:
        path: /etc/pam.d/su
        insertafter: '^auth\s+sufficient\s+pam_rootok\.so'
        line: 'auth       required   pam_wheel.so use_uid group=sudo'
        unsafe_writes: true

  #####################################################################
  # 2.2.5 ACCESS CONTROL
  #####################################################################

    - name: Ensure pam_access enabled
      ansible.builtin.lineinfile:
        path: /etc/pam.d/common-account
        regexp: '^\s*account\s+required\s+pam_access\.so'
        line: 'account required pam_access.so'
        insertafter: EOF
        unsafe_writes: true

    - name: Configure access.conf (managed block)
      ansible.builtin.blockinfile:
        path: /etc/security/access.conf
        create: true
        marker: "# {mark} ANSIBLE IBN 2.2.5"
        unsafe_writes: true
        block: |
          +:root:LOCAL
          +:localadmin:ALL
          +:{{ ldap_admin_group }}:ALL
          +:{{ ldap_users_group }}:ALL
          -:ALL:ALL

  #####################################################################
  # 2.2.6 FAILLOCK POLICY
  #####################################################################

    - name: Ensure faillock parameters
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        create: true
        unsafe_writes: true
      loop:
        - { regexp: '^\s*deny\s*=', line: 'deny = 5' }
        - { regexp: '^\s*fail_interval\s*=', line: 'fail_interval = 900' }
        - { regexp: '^\s*unlock_time\s*=', line: 'unlock_time = 900' }
        - { regexp: '^\s*audit\s*$', line: 'audit' }
        - { regexp: '^\s*silent\s*$', line: 'silent' }
        - { regexp: '^\s*dir\s*=', line: 'dir = /var/lib/faillock' }

    - name: Ensure faillock directory exists
      ansible.builtin.file:
        path: /var/lib/faillock
        state: directory
        owner: root
        group: root
        mode: "0700"