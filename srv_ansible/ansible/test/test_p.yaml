---
- name: Compliance | Antivirus (СЗИ 3.1.1) – update each host
  hosts: "ws_*:srv_fs"
  become: true
  gather_facts: false
  serial: 1

  tasks:

  ####################################################################
  # 1. INSTALL PACKAGES
  ####################################################################
  - name: Ensure ClamAV packages installed
    ansible.builtin.apt:
      name:
        - clamav
        - clamav-daemon
        - clamav-freshclam
      state: present
      update_cache: true

  ####################################################################
  # 2. FIX freshclam.conf (mirror)
  ####################################################################
  - name: Ensure freshclam.conf exists
    ansible.builtin.file:
      path: /etc/clamav/freshclam.conf
      state: touch

  - name: Configure freshclam (compliance mirror)
    ansible.builtin.blockinfile:
      path: /etc/clamav/freshclam.conf
      block: |
        Checks 24
        DatabaseMirror clamav-mirror.ru
        DNSDatabaseInfo no
      marker: "# {mark} ANSIBLE MANAGED BLOCK"

  ####################################################################
  # 3. STOP SERVICES (init.d friendly)
  ####################################################################
  - name: Stop clamav-daemon
    ansible.builtin.command: /etc/init.d/clamav-daemon stop
    ignore_errors: true

  - name: Stop freshclam
    ansible.builtin.command: /etc/init.d/clamav-freshclam stop
    ignore_errors: true

  ####################################################################
  # 4. UPDATE DATABASES (on each host)
  ####################################################################
  - name: Update virus databases via freshclam
    ansible.builtin.command: freshclam
    register: freshclam_result
    changed_when: "'Database updated' in freshclam_result.stdout"
    failed_when: false
    ignore_errors: true

  ####################################################################
  # 5. START SERVICES
  ####################################################################
  - name: Start freshclam
    ansible.builtin.command: /etc/init.d/clamav-freshclam start
    ignore_errors: true

  - name: Start clamav-daemon
    ansible.builtin.command: /etc/init.d/clamav-daemon start
    ignore_errors: true

  - name: Wait for daemon
    ansible.builtin.pause:
      seconds: 5

  - name: Check daemon process
    ansible.builtin.command: pgrep clamd
    register: clamd_check
    failed_when: false
    changed_when: false

  ####################################################################
  # 6. COMPLIANCE (soft, cooldown-safe)
  ####################################################################
  - name: Compliance soft check
    ansible.builtin.shell: |
      errors=""

      # packages
      for pkg in clamav clamav-daemon clamav-freshclam; do
        dpkg -s "$pkg" >/dev/null 2>&1 || errors="$errors pkg_$pkg"
      done

      # services (process)
      pgrep clamd >/dev/null 2>&1 || errors="$errors svc_clamd"
      pgrep freshclam >/dev/null 2>&1 || errors="$errors svc_freshclam"

      # databases (soft)
      [ -f /var/lib/clamav/main.cvd ] || errors="$errors db_main"
      [ -f /var/lib/clamav/daily.cvd ] || errors="$errors db_daily"

      # config compliance
      grep -Eq '^\s*Checks\s+([4-9]|[1-9][0-9]+)\s*$' /etc/clamav/freshclam.conf || errors="$errors checks"
      grep -Eq '^\s*DatabaseMirror\s+clamav-mirror\.ru\s*$' /etc/clamav/freshclam.conf || errors="$errors mirror"
      grep -Eq '^\s*DNSDatabaseInfo\s+no\s*$' /etc/clamav/freshclam.conf || errors="$errors dns"

      if [ -z "$errors" ]; then
        echo "{{ inventory_hostname }}: OK"
      else
        echo "{{ inventory_hostname }}: NOT OK ($errors)"
      fi
    register: check_result
    changed_when: false
    ignore_errors: yes

  - name: Print result
    ansible.builtin.debug:
      msg: "{{ check_result.stdout }}"